---
layout: default
panel_includes:
  - toc
---

{% include lang.html %}
{% include toc-status.html %}

<article class="px-1" data-toc="{{ enable_toc }}">
  <h1 class="dynamic-title" data-toc-skip>{{ page.title }}</h1>

  {% if enable_toc %}
    <div id="toc-bar" class="d-flex align-items-center justify-content-between invisible">
      <span class="label text-truncate">{{ page.title }}</span>
      <button type="button" class="toc-trigger btn me-1">
        <i class="fa-solid fa-list-ul fa-fw"></i>
      </button>
    </div>

    <button id="toc-solo-trigger" type="button" class="toc-trigger btn btn-outline-secondary btn-sm">
      <span class="label ps-2 pe-1" data-i18n="panel.toc">{{- site.data.locales[lang].panel.toc -}}</span>
      <i class="fa-solid fa-angle-right fa-fw"></i>
    </button>

    <dialog id="toc-popup" class="p-0">
      <div class="header d-flex flex-row align-items-center justify-content-between">
        <div class="label text-truncate py-2 ms-4">{{- page.title -}}</div>
        <button id="toc-popup-close" type="button" class="btn mx-1 my-1 opacity-75">
          <i class="fas fa-close"></i>
        </button>
      </div>
      <div id="toc-popup-content" class="px-4 py-3 pb-4"></div>
    </dialog>
  {% endif %}

  <div class="content">
    {{ content }}
  </div>
</article>

{% if enable_toc %}
  <script>
    window.addEventListener('load', () => {
      const article = document.querySelector('main > article[data-toc="true"]');
      const toc = document.getElementById('toc');
      const popupContent = document.getElementById('toc-popup-content');
      const wrapper = document.getElementById('toc-wrapper');

      if (!article || !toc || toc.children.length > 0) return;

      const headings = Array.from(article.querySelectorAll('.content h2, .content h3, .content h4'));
      if (headings.length === 0) return;

      const slugify = (text) =>
        text
          .trim()
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '');

      const list = document.createElement('ul');
      list.className = 'toc-list';

      headings.forEach((heading) => {
        if (!heading.id) heading.id = slugify(heading.textContent);

        const item = document.createElement('li');
        item.className = `toc-list-item toc-${heading.tagName.toLowerCase()}`;

        const link = document.createElement('a');
        link.className = 'toc-link';
        link.href = `#${heading.id}`;
        link.textContent = heading.textContent;

        item.appendChild(link);
        list.appendChild(item);
      });

      toc.appendChild(list);
      if (popupContent) popupContent.appendChild(list.cloneNode(true));
      wrapper?.classList.remove('invisible');
    });
  </script>
{% endif %}
