  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="118" y="296" fill="#f8fafc" font-size="20" font-weight="800">Symptoms</text>
    <text x="118" y="326" fill="#94a3b8" font-size="15">What is broken?</text>
    <text x="344" y="296" fill="#f8fafc" font-size="20" font-weight="800">Hypothesis</text>
