    <rect x="314" y="254" width="180" height="100" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="540" y="254" width="180" height="100" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="766" y="254" width="180" height="100" rx="8" fill="#0f172a" stroke="#334155"/>
    <rect x="992" y="254" width="120" height="100" rx="8" fill="#0f172a" stroke="#334155"/>
  </g>
  <g fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M268 304H314"/>
    <path d="M494 304H540"/>
    <path d="M720 304H766"/>
    <path d="M946 304H992"/>
    <path d="M304 294L314 304L304 314"/>
    <path d="M530 294L540 304L530 314"/>
    <path d="M756 294L766 304L756 314"/>
    <path d="M982 294L992 304L982 314"/>
