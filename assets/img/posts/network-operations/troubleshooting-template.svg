<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Network Troubleshooting Case Study Template</title>
  <desc id="desc">A structured network troubleshooting workflow from symptoms to root cause and verification.</desc>
  <defs>
