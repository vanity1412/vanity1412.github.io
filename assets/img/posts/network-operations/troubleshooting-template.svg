    <text x="796" y="296" fill="#f8fafc" font-size="20" font-weight="800">Solution</text>
    <text x="796" y="326" fill="#94a3b8" font-size="15">How was it fixed?</text>
    <text x="1018" y="296" fill="#f8fafc" font-size="20" font-weight="800">Verify</text>
